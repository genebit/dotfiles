# ===== FONT =====
font_family      Geist Mono
bold_font        Geist Mono
italic_font      Geist Mono
font_size        10.0

# Disable runtime font size changes
map ctrl+shift+equal  no_op
map ctrl+shift+plus   no_op
map ctrl+shift+minus  no_op
map ctrl+shift+kp_add no_op
map ctrl+equal        no_op
map ctrl+plus         no_op
map ctrl+minus        no_op

# ===== WINDOW =====
background_opacity 0.88
window_padding_width 12
remember_window_size no
initial_window_width  900
initial_window_height 560

# ===== CURSOR =====
cursor_shape     beam
cursor_blink_interval 0.5

# ===== SCROLLBACK =====
scrollback_lines 10000

# ===== COLORS (Gruvbox Dark) =====
foreground              #ebdbb2
background              #1d2021
selection_foreground    #282828
selection_background    #d79921

cursor                  #ebdbb2
cursor_text_color       #282828

# Black
color0  #282828
color8  #928374
# Red
color1  #cc241d
color9  #fb4934
# Green
color2  #98971a
color10 #b8bb26
# Yellow
color3  #d79921
color11 #fabd2f
# Blue
color4  #458588
color12 #83a598
# Magenta
color5  #b16286
color13 #d3869b
# Cyan
color6  #689d6a
color14 #8ec07c
# White
color7  #a89984
color15 #ebdbb2

# ===== URL =====
url_color #83a598
url_style curly

# ===== TAB BAR =====
tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground   #282828
active_tab_background   #fabd2f
inactive_tab_foreground #a89984
inactive_tab_background #3c3836
