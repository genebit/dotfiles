# ===== MONITORS =====
# Auto detect (default for laptops/single monitor)
monitor = , preferred, auto, 1

# Specific dual-monitor setup (Example names, update to your actual monitor names)
# monitor = DP-3, 1920x1080@60, 0x0, 1
# monitor = DP-2, 1920x1080@60, 1920x0, 1

# ===== WORKSPACES =====
# Default workspaces assignment (can be overridden if multiple monitors detected)
# workspace = 1,  monitor:DP-3, default:true
# workspace = 6,  monitor:DP-2, default:true

# ===== AUTOSTART =====
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP && systemctl --user start graphical-session.target
exec-once = swww-daemon --format xrgb
exec-once = swww img ~/Pictures/wallpapers/wall.jpg
exec-once = waybar
exec-once = hyprswitch init --show-title &
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = hypridle

# ===== ENVIRONMENT =====
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ===== INPUT =====
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# ===== GENERAL =====
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(fabd2fee) rgba(d79921ee) 45deg
    col.inactive_border = rgba(3c383699)
    layout = dwindle
    allow_tearing = false
}

# ===== DECORATION =====
decoration {
    rounding = 12

    blur {
        enabled = true
        size = 8
        passes = 2
        vibrancy = 0.17
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(fabd2f22)
    }
}

# ===== ANIMATIONS =====
animations {
    enabled = true

    bezier = overshot,  0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn,  0.25, 1, 0.5, 1

    animation = windows,     1, 5, overshot, slide
    animation = windowsOut,  1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, smoothIn,  slide
    animation = fade,        1, 5, smoothIn
    animation = fadeOut,     1, 4, smoothOut
    animation = border,      1, 10, default
    animation = workspaces,  1, 6, overshot, slidevert
}

# ===== LAYOUT =====
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}

# ===== MISC =====
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# ===== GESTURES =====
gesture = 3, horizontal, workspace

# ===== WINDOW RULES =====
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = float-nm-connection-editor
    match:class = ^(nm-connection-editor)$
    float = true
}

windowrule {
    name = float-blueman-manager
    match:class = ^(blueman-manager)$
    float = true
}

windowrule {
    name = float-pip
    match:title = ^(Picture-in-Picture)$
    float = true
}

windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol)$
    float = true
}

# ===== KEYBINDINGS =====
$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = rofi -show APPS -modi "APPS:~/.config/rofi/appmenu.sh,calc,POWER:~/.config/rofi/powermenu.sh" -theme ~/.config/rofi/launcher.rasi -calc-command "echo -n '{result}' | wl-copy" -display-calc "CALCULATOR"

bind = ALT, Tab,       exec, hyprswitch gui --do-initial-execute
bind = ALT, Tab,       submap, hyprswitch
bind = ALT SHIFT, Tab, exec, hyprswitch gui --do-initial-execute --reverse
bind = ALT SHIFT, Tab, submap, hyprswitch
submap = hyprswitch
bind = ALT, Tab,            exec, hyprswitch gui --do-initial-execute
bind = ALT SHIFT, Tab,      exec, hyprswitch gui --do-initial-execute --reverse
bindrt = ALT, Alt_L,        exec, hyprswitch close
bindrt = ALT, Alt_L,        submap, reset
bind = , escape,            exec, hyprswitch close --kill
bind = , escape,            submap, reset
submap = reset

bind = $mainMod, T,         exec, $terminal
bind = $mainMod, B,         exec, firefox
bind = ALT, F4,             killactive
bind = CTRL SHIFT, Q,       exec, true
bind = $mainMod, E,         exec, $fileManager
bind = CTRL, space,         exec, $menu
bind = $mainMod, F,         fullscreen
bind = $mainMod, V,         togglefloating
bind = $mainMod, P,         pseudo
bind = $mainMod, J,         togglesplit
bind = $mainMod, L,         exec, hyprlock
bind = $mainMod SHIFT, M,   exit

# Move focus with arrow keys or vim keys
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

# Switch virtual desktop (both monitors move together)
bind = $mainMod SHIFT, right, exec, ~/.config/hypr/scripts/workspace.sh switch-next
bind = $mainMod SHIFT, left,  exec, ~/.config/hypr/scripts/workspace.sh switch-prev

# Move window to next/prev monitor
bind = $mainMod CTRL SHIFT, right, exec, hyprctl dispatch movewindow mon+1 && hyprctl dispatch focusmonitor +1
bind = $mainMod CTRL SHIFT, left,  exec, hyprctl dispatch movewindow mon-1 && hyprctl dispatch focusmonitor -1

# Tile layout: left/right = columns, up/down = rows
bind = $mainMod ALT, left,  exec, ~/.config/hypr/scripts/tile-layout.sh left
bind = $mainMod ALT, right, exec, ~/.config/hypr/scripts/tile-layout.sh right
bind = $mainMod ALT, up,    exec, ~/.config/hypr/scripts/tile-layout.sh up
bind = $mainMod ALT, down,  exec, ~/.config/hypr/scripts/tile-layout.sh down

# Resize windows
binde = $mainMod CTRL, right, resizeactive,  30 0
binde = $mainMod CTRL, left,  resizeactive, -30 0
binde = $mainMod CTRL, up,    resizeactive,  0 -30
binde = $mainMod CTRL, down,  resizeactive,  0  30

# Switch virtual desktops (both monitors move together)
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/workspace.sh switch 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/workspace.sh switch 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/workspace.sh switch 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/workspace.sh switch 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/workspace.sh switch 5

# Move window to virtual desktop
bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/workspace.sh move 1
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/workspace.sh move 2
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/workspace.sh move 3
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/workspace.sh move 4
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/workspace.sh move 5

# Move window to next/prev virtual desktop
bind = CTRL $mainMod ALT, right, exec, ~/.config/hypr/scripts/workspace.sh move-next
bind = CTRL $mainMod ALT, left,  exec, ~/.config/hypr/scripts/workspace.sh move-prev

# Scroll through workspaces
bind = $mainMod, mouse_down, exec, ~/.config/hypr/scripts/workspace.sh switch-next
bind = $mainMod, mouse_up,   exec, ~/.config/hypr/scripts/workspace.sh switch-prev

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media & volume keys
bind = , XF86AudioRaiseVolume,  exec, pamixer -i 5
bind = , XF86AudioLowerVolume,  exec, pamixer -d 5
bind = , XF86AudioMute,         exec, pamixer -t
bind = , XF86MonBrightnessUp,   exec, brightnessctl s 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl s 10%-
bind = , XF86AudioPlay,         exec, playerctl play-pause
bind = , XF86AudioNext,         exec, playerctl next
bind = , XF86AudioPrev,         exec, playerctl previous

# Screenshot
bind = $mainMod SHIFT, S,  exec, grim -g "$(slurp)" - | wl-copy
